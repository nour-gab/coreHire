services:
  postgres:
    image: postgres:16-alpine
    container_name: corehire-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: corehire
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - corehire_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d corehire"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  corehire_pgdata:
